lidar_camera_overlay_node:
  ros__parameters:
    camera.fx: 1200.0
    camera.fy: 1200.0
    camera.cx: 960.0
    camera.cy: 600.0
    camera.width: 1920
    camera.height: 1200

    # Assume camera and LiDAR are side-by-side on same horizontal plane
    # translation: lidar -> camera (x forward, y left, z up)
    extrinsics.translation: [-0.4, 0.0, 0.2]   # camera is 40 cm to the left of LiDAR
    extrinsics.rotation_rpy: [0.0, 0.0, 0.0]  # aligned (no roll/pitch/yaw difference)

    topics.camera_image: "/triton_left/images"
    topics.lidar_points: "/lidar_points"
    topics.overlay_image: "/fusion/overlay_image"

    sync.max_time_diff_sec: 0.05  # 50 ms tolerance

